# cepi — full-stack docker compose.
#
# Services:
#   postgres           Postgres 16 + pgvector
#   todoerp-backend    ERP API (TodoERP)
#   todoerp-frontend   ERP admin UI (Vite dev server)
#   cepi-bot           medical conversational agent
#   cepi-frontend      medical chat UI (Vite dev server)
#   cepi-isic          Python FastAPI image inference (stub mode)
#
# Bring everything up: `docker compose up -d` (then watch `docker compose logs -f`).
# DB persists in `pg_data` volume; attachments persist in `todoerp_uploads`.
#
# Production warning: this compose targets DEV. The Vite dev servers are not
# meant for production — for prod you'd build static assets and serve via
# nginx, run TodoERP/cepi-bot behind a process supervisor, etc.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cepi-postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: cerebro
      POSTGRES_DB:       cepi
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cepi"]
      interval: 5s
      timeout: 3s
      retries: 10

  todoerp-backend:
    build:
      context: ./TodoERP/backend
      dockerfile: Dockerfile
    container_name: cepi-todoerp-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    development
      STAGE:       DEVELOP
      PORT:        3001
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     cepi
      DB_USER:     postgres
      DB_PASSWORD: cerebro
      JWT_SECRET:  dev_secret_cambiame
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://*.localhost"
      CEPI_MEDICAL: "1"
      CEPI_ISIC_URL: "http://cepi-isic:8000"
    ports:
      - "3001:3001"
    volumes:
      - todoerp_uploads:/app/uploads

  todoerp-frontend:
    build:
      context: ./TodoERP/frontend
      dockerfile: Dockerfile
    container_name: cepi-todoerp-frontend
    depends_on: [todoerp-backend]
    environment:
      VITE_API_URL: "http://localhost:3001"
    ports:
      - "5173:5173"

  cepi-bot:
    build:
      context: ./cepi-bot
      dockerfile: Dockerfile
    container_name: cepi-bot
    depends_on: [todoerp-backend]
    environment:
      PORT: 3002
      TODOERP_API_URL: "http://todoerp-backend:3001"
      CEPI_LLM_PROVIDER: "stub"
    ports:
      - "3002:3002"

  cepi-frontend:
    build:
      context: ./cepi-frontend
      dockerfile: Dockerfile
    container_name: cepi-frontend
    depends_on: [cepi-bot]
    ports:
      - "5174:5174"

  cepi-isic:
    build:
      context: ./cepi-isic
      dockerfile: Dockerfile
    container_name: cepi-isic
    environment:
      CEPI_ISIC_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  pg_data:
  todoerp_uploads:
